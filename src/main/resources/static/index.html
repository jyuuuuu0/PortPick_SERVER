<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PortPick Auth Check</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f4efe7;
            --panel: rgba(255, 252, 247, 0.9);
            --text: #1d1d1b;
            --muted: #6d665c;
            --accent: #0a7c66;
            --danger: #b33a3a;
            --border: rgba(29, 29, 27, 0.1);
            --shadow: 0 24px 60px rgba(65, 49, 29, 0.15);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", "Apple SD Gothic Neo", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top right, rgba(10, 124, 102, 0.18), transparent 32%),
                radial-gradient(circle at left center, rgba(179, 58, 58, 0.12), transparent 28%),
                linear-gradient(135deg, #efe5d6, var(--bg));
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .panel {
            width: min(720px, 100%);
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 32px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(18px);
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(2rem, 4vw, 3rem);
        }

        p {
            margin: 0 0 20px;
            color: var(--muted);
            line-height: 1.6;
        }

        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }

        button, a {
            appearance: none;
            border: none;
            border-radius: 999px;
            padding: 14px 20px;
            font: inherit;
            text-decoration: none;
            cursor: pointer;
            transition: transform 0.15s ease, opacity 0.15s ease, background-color 0.15s ease;
        }

        .primary {
            color: white;
            background: var(--accent);
        }

        .secondary {
            color: var(--text);
            background: white;
            border: 1px solid var(--border);
        }

        button:hover, a:hover {
            transform: translateY(-1px);
        }

        .status {
            border-radius: 18px;
            padding: 18px;
            background: rgba(255, 255, 255, 0.78);
            border: 1px solid var(--border);
        }

        .status.success {
            border-color: rgba(10, 124, 102, 0.25);
        }

        .status.error {
            border-color: rgba(179, 58, 58, 0.25);
        }

        pre {
            margin: 16px 0 0;
            padding: 16px;
            overflow: auto;
            border-radius: 16px;
            background: #111814;
            color: #ecfff9;
        }

        .hint {
            margin-top: 18px;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
<main class="panel">
    <h1>PortPick Login Check</h1>
    <p>Google OAuth 로그인 성공 여부를 이 페이지에서 바로 확인할 수 있습니다. 성공하면 보호 API인 <code>/api/v1/auth/me</code> 응답이 표시됩니다.</p>

    <div class="actions">
        <a class="primary" href="/oauth2/authorization/google">Google 로그인 시작</a>
        <button class="secondary" id="refreshButton" type="button">상태 다시 확인</button>
        <button class="secondary" id="logoutButton" type="button">로그아웃</button>
    </div>

    <section class="status" id="statusBox">
        로그인 상태를 확인하는 중입니다.
    </section>

    <p class="hint">성공 기준: 이 페이지에서 인증됨 상태와 사용자 정보가 보여야 합니다. 실패 시 에러 메시지 또는 미인증 상태가 표시됩니다.</p>
</main>

<script>
    const statusBox = document.getElementById("statusBox");
    const refreshButton = document.getElementById("refreshButton");
    const logoutButton = document.getElementById("logoutButton");

    async function renderStatus() {
        const params = new URLSearchParams(window.location.search);
        if (params.get("error")) {
            statusBox.className = "status error";
            statusBox.textContent = "OAuth 로그인에 실패했습니다. Google Console의 redirect URI와 서버 설정을 다시 확인하세요.";
            return;
        }

        try {
            const response = await fetch("/api/v1/auth/me", {
                credentials: "same-origin"
            });

            if (!response.ok) {
                statusBox.className = "status error";
                statusBox.textContent = "현재 로그인되지 않았습니다. Google 로그인 버튼으로 인증을 시작하세요.";
                return;
            }

            const payload = await response.json();
            statusBox.className = "status success";
            statusBox.innerHTML = "<strong>로그인 성공</strong><pre>" +
                JSON.stringify(payload, null, 2) +
                "</pre>";
        } catch (error) {
            statusBox.className = "status error";
            statusBox.textContent = "상태 확인 요청에 실패했습니다. 서버가 실행 중인지 확인하세요.";
        }
    }

    async function logout() {
        const response = await fetch("/api/v1/auth/logout", {
            method: "POST",
            credentials: "same-origin"
        });

        if (response.status === 204) {
            history.replaceState({}, "", "/");
            await renderStatus();
            return;
        }

        statusBox.className = "status error";
        statusBox.textContent = "로그아웃에 실패했습니다.";
    }

    refreshButton.addEventListener("click", renderStatus);
    logoutButton.addEventListener("click", logout);
    renderStatus();
</script>
</body>
</html>

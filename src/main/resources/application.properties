spring.config.import=optional:file:.env[.properties]

server.port=8082

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3307/portfolio_db?serverTimezone=Asia/Seoul}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:dummy-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:dummy-google-client-secret}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/api/v1/auth/login/oauth2/code/{registrationId}

jwt.secret=${JWT_SECRET:change-me-to-a-long-random-secret-key-at-least-32-bytes}
jwt.expiration=${JWT_EXPIRATION_MS:1800000}

app.oauth2.authorized-redirect-url=${APP_OAUTH2_REDIRECT_URL:http://localhost:8082/}
app.oauth2.failure-redirect-url=${APP_OAUTH2_FAILURE_URL:http://localhost:8082/}
app.auth.cookie-name=${APP_AUTH_COOKIE_NAME:PORTPICK_ACCESS_TOKEN}
app.auth.cookie-secure=${APP_AUTH_COOKIE_SECURE:false}
app.profile.upload-dir=${APP_PROFILE_UPLOAD_DIR:uploads/profiles}
app.profile.upload-url-prefix=${APP_PROFILE_UPLOAD_URL_PREFIX:/uploads/profiles}
app.profile.default-image-url=${APP_PROFILE_DEFAULT_IMAGE_URL:/images/default-profile.svg}
app.portfolio.upload-dir=${APP_PORTFOLIO_UPLOAD_DIR:uploads/portfolios}
app.portfolio.upload-url-prefix=${APP_PORTFOLIO_UPLOAD_URL_PREFIX:/uploads/portfolios}
